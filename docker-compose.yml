version: '3.8'

services:
  # Main application service
  openagent-love:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: openagent-love-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/evolution.db
      - LOG_LEVEL=info
    volumes:
      # Persist database data
      - openagent-data:/app/data
      # Mount skills directory for updates
      - ./skills:/app/skills:ro
    networks:
      - openagent-network
    depends_on:
      - sqlite-backup
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('Healthy')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Automated backup service
  sqlite-backup:
    image: alpine:latest
    container_name: openagent-backup
    restart: unless-stopped
    volumes:
      - openagent-data:/source:ro
      - ./backups:/backup
      - ./scripts/backup.sh:/backup.sh:ro
    environment:
      - BACKUP_INTERVAL=86400
      - BACKUP_RETENTION_DAYS=7
    entrypoint: ["/bin/sh", "/backup.sh"]
    networks:
      - openagent-network
    depends_on:
      - openagent-love

  # Test runner service (on-demand)
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: openagent-test
    profiles:
      - test
    volumes:
      - ./skills:/app/skills
      - ./test-results:/app/test-results
    environment:
      - NODE_ENV=test
      - DB_PATH=/app/data/test.db
    command: ["npm", "test"]
    networks:
      - openagent-network
    depends_on:
      - openagent-love

  # Development service with hot reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: openagent-dev
    profiles:
      - dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - WATCH=true
    command: ["npm", "run", "test:watch"]
    networks:
      - openagent-network

volumes:
  # Persistent database storage
  openagent-data:
    driver: local
  # Backup storage (managed by backup service)
  backup-storage:
    driver: local

networks:
  openagent-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
